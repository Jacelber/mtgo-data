schema_version: "1.1.0"

formats:
  - id: "standard"
    display_name: "Standard"
    state: "executable"
    public: true
    mtgo:
      enabled: true
      event_collection_enabled: true
      capabilities:
        - "event_fetching"
        - "raw_event_storage"
        - "normalization"
        - "classification"
        - "event_statistics"
        - "range_statistics"
        - "matchup_statistics"
        - "weekly_pickup"
        - "metadata_generation"
        - "catalog_generation"
      paths:
        events: "data/standard"
        matches: "data/standard/mtgo/matches"
        rules: "my_archetypes/standard.yaml"
        statistics: "stats/standard/mtgo"
        reports: "reports/standard/mtgo"

  - id: "pauper"
