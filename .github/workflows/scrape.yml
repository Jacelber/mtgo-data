name: Daily MTGO Scraper

on:
  schedule:
    - cron: '0 4 * * *'       # 每天 UTC 04:00 运行（北京时间中午 12:00）
  workflow_dispatch:           # 允许手动点按钮触发，方便测试

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 取出仓库代码和已有数据
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python batch_mtgo.py

      - name: 提交并推送新数据
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ fetched.txt
          git diff --staged --quiet || git commit -m "自动抓取：更新赛事数据"
          git push
