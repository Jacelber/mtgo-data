name: MTGO production data update

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: production-data-update
  cancel-in-progress: false

jobs:
  update:
    name: Fetch, generate, validate, and publish MTGO data
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: src
      MTGO_FORMAT: standard
      MTGO_EVENT_FORMATS: "standard legacy pioneer pauper vintage modern"
    steps:
      - name: Check out full history for metadata and publication
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install pinned runtime and validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Fetch configured MTGO event archives
        shell: bash
        run: |
          for FORMAT in $MTGO_EVENT_FORMATS; do
            echo "Collecting MTGO event raw data for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" fetch-events
          done

      - name: Fetch Videre matches
        run: python -B -m mtgmeta.mtgo --format "$MTGO_FORMAT" fetch-matches

      - name: Build Standard statistics
        run: python -B -m mtgmeta.mtgo --format "$MTGO_FORMAT" build-statistics

      - name: Build Standard matchup statistics
        run: python -B -m mtgmeta.mtgo --format "$MTGO_FORMAT" build-matchups

      - name: Generate Weekly Pickup candidates when absent
        continue-on-error: true
        run: python -B -m mtgmeta.mtgo --format "$MTGO_FORMAT" pickup candidates --if-absent

      - name: Generate Standard metadata
        run: python -B -m mtgmeta.mtgo --format "$MTGO_FORMAT" generate-metadata

      - name: Generate and strictly validate classification diagnostics
        run: python -B -m mtgmeta.mtgo --format "$MTGO_FORMAT" classification-reports --strict

      - name: Validate repository files and references
        run: python -B validate_repository.py

      - name: Validate Standard archetype rules
        run: python -B validate_rules.py

      - name: Validate Standard public JSON schemas
        run: python -B validate_schemas.py

      - name: Run regression tests
        run: python -B -m pytest

      - name: Commit and push generated changes
        id: publish
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- data/ stats/ reports/ fetched.txt
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes to publish."
            exit 0
          fi
          git commit -m "chore: update MTGO production data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:master
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Write production update summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MTGO production data update"
            echo
            echo "- Job result: ${{ job.status }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Source branch: ${{ github.ref_name }}"
            echo "- Generated changes published: ${{ steps.publish.outputs.changed || 'not-reached' }}"
            echo "- Format: ${MTGO_FORMAT}"
            echo "- Pipeline: MTGO events, Videre matches, statistics, matchup statistics, Pickup candidates, metadata, de-identified classification diagnostics, validation, and publication."
          } >> "$GITHUB_STEP_SUMMARY"
