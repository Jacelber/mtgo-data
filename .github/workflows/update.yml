name: MTGO production data update

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: production-data-update
  cancel-in-progress: false

jobs:
  update:
    name: Fetch, generate, validate, and publish MTGO data
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out full history for metadata and publication
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install pinned runtime and validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Fetch official MTGO events
        run: python -B batch_mtgo.py

      - name: Fetch Videre matches
        run: python -B fetch_videre_matches.py

      - name: Build Standard statistics
        run: python -B stats_standard.py

      - name: Build Standard matchup statistics
        run: python -B stats_matchup.py

      - name: Dump unknown high-performing decks
        run: python -B dump_unknown_highperf.py
        continue-on-error: true

      - name: Cluster unknown decks
        run: python -B cluster_unknown.py
        continue-on-error: true

      - name: Generate Weekly Pickup candidates when absent
        continue-on-error: true
        shell: bash
        run: |
          WEEK=$(python -B -c "from stats_standard import load_all_events, latest_complete_week; from weekly_pickup import iso_week_label; events=load_all_events(); latest=latest_complete_week(events); print(iso_week_label(latest) if latest else '')")
          echo "Latest complete week: ${WEEK:-none}"
          if [ -z "$WEEK" ]; then
            echo "Skipping candidate generation because no complete week is available."
          elif [ -f "stats/standard/mtgo/pickup/candidates_${WEEK}.yaml" ]; then
            echo "Preserving existing manually reviewed candidates_${WEEK}.yaml."
          else
            python -B weekly_pickup.py candidates
          fi

      - name: Generate Standard metadata
        run: python -B gen_meta.py

      - name: Validate repository files and references
        run: python -B validate_repository.py

      - name: Validate Standard archetype rules
        run: python -B validate_rules.py

      - name: Validate Standard public JSON schemas
        run: python -B validate_schemas.py

      - name: Run regression tests
        run: python -B -m pytest

      - name: Commit and push generated changes
        id: publish
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- data/ stats/ fetched.txt unknown_highperf.txt unknown_clusters.txt
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes to publish."
            exit 0
          fi
          git commit -m "chore: update MTGO production data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:master
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Write production update summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MTGO production data update"
            echo
            echo "- Job result: ${{ job.status }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Source branch: ${{ github.ref_name }}"
            echo "- Generated changes published: ${{ steps.publish.outputs.changed || 'not-reached' }}"
            echo "- Pipeline: MTGO events, Videre matches, Standard statistics, matchup statistics, metadata, validation, and publication."
          } >> "$GITHUB_STEP_SUMMARY"
