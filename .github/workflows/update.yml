name: MTGO production data update

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: production-data-update
  cancel-in-progress: false

jobs:
  update:
    name: Fetch, generate, validate, and publish MTGO data
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: src
      MTGO_EVENT_FORMATS: "standard legacy pioneer pauper vintage modern"
      MTGO_PRODUCT_FORMATS: "standard modern"
      MTGO_HIERARCHY_FORMATS: "standard modern"
    steps:
      - name: Check out full history for metadata and publication
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install pinned runtime and validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Verify clean-checkout code and committed baseline
        run: python -B -m pytest

      - name: Snapshot production data baseline
        run: python -B validate_production_candidate.py snapshot --output "$RUNNER_TEMP/production-baseline.json"

      - name: Fetch configured MTGO event archives
        shell: bash
        run: |
          for FORMAT in $MTGO_EVENT_FORMATS; do
            echo "Collecting MTGO event raw data for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" fetch-events
          done

      - name: Fetch Videre matches for product formats
        shell: bash
        run: |
          for FORMAT in $MTGO_PRODUCT_FORMATS; do
            echo "Collecting Videre match data for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" fetch-matches
          done

      - name: Build product statistics
        shell: bash
        run: |
          for FORMAT in $MTGO_PRODUCT_FORMATS; do
            echo "Building MTGO statistics for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" build-statistics
          done

      - name: Build product matchup statistics
        shell: bash
        run: |
          for FORMAT in $MTGO_PRODUCT_FORMATS; do
            echo "Building matchup statistics for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" build-matchups
          done

      - name: Generate Weekly Pickup candidates when absent
        continue-on-error: true
        shell: bash
        run: |
          STATUS=0
          for FORMAT in $MTGO_PRODUCT_FORMATS; do
            echo "Preparing Weekly Pickup candidates for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" pickup candidates --if-absent || STATUS=$?
          done
          exit "$STATUS"

      - name: Generate maintained hierarchy catalogs
        shell: bash
        run: |
          for FORMAT in $MTGO_HIERARCHY_FORMATS; do
            echo "Generating archetype hierarchy for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" generate-hierarchy
          done

      - name: Generate product metadata
        shell: bash
        run: |
          for FORMAT in $MTGO_PRODUCT_FORMATS; do
            echo "Generating MTGO metadata for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" generate-metadata
          done

      - name: Generate and strictly validate product classification diagnostics
        shell: bash
        run: |
          for FORMAT in $MTGO_PRODUCT_FORMATS; do
            echo "Generating classification diagnostics for ${FORMAT}."
            python -B -m mtgmeta.mtgo --format "$FORMAT" classification-reports --strict
          done

      - name: Validate production candidate scope and data increments
        run: python -B validate_production_candidate.py validate --baseline "$RUNNER_TEMP/production-baseline.json"

      - name: Validate repository files and references
        run: python -B validate_repository.py

      - name: Validate product archetype rules
        shell: bash
        run: |
          for FORMAT in $MTGO_PRODUCT_FORMATS; do
            python -B validate_rules.py "my_archetypes/${FORMAT}.yaml"
          done

      - name: Validate generated JSON schemas
        run: python -B validate_schemas.py

      - name: Commit and push generated changes
        id: publish
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- data/ stats/ reports/ fetched.txt
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "No generated changes to publish."
            exit 0
          fi
          git commit -m "chore: update MTGO production data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:master
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify published master commit and clean workspace
        id: verify
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Production workspace is not clean after publication." >&2
            git status --short >&2
            exit 1
          fi
          LOCAL_SHA="$(git rev-parse HEAD)"
          REMOTE_SHA="$(git ls-remote origin refs/heads/master | awk '{print $1}')"
          if [ "$LOCAL_SHA" != "$REMOTE_SHA" ]; then
            echo "Published master mismatch: local=$LOCAL_SHA remote=$REMOTE_SHA" >&2
            exit 1
          fi
          echo "commit=$LOCAL_SHA" >> "$GITHUB_OUTPUT"
          echo "Published master verified at $LOCAL_SHA."

      - name: Write production update summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MTGO production data update"
            echo
            echo "- Job result: ${{ job.status }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Source branch: ${{ github.ref_name }}"
            echo "- Generated changes published: ${{ steps.publish.outputs.changed || 'not-reached' }}"
            echo "- Published commit verified: ${{ steps.verify.outputs.commit || 'not-reached' }}"
            echo "- Product formats: ${MTGO_PRODUCT_FORMATS}"
            echo "- Hierarchy formats: ${MTGO_HIERARCHY_FORMATS}"
            echo "- Validation layers: clean-checkout regression, production candidate acceptance, and published-commit confirmation."
            echo "- Pipeline: all configured MTGO event archives; Standard and Modern Videre matches, statistics, hierarchical matchup statistics, Pickup candidates, metadata, hierarchy catalogs, de-identified classification diagnostics; validation and publication."
          } >> "$GITHUB_STEP_SUMMARY"
