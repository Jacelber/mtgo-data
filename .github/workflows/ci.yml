name: Pull request validation

on:
  pull_request: {}
  push:
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Repository validation (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository without persisted credentials
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install pinned development dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate repository files and references
        run: python -B validate_repository.py

      - name: Validate Standard archetype rules
        run: python -B validate_rules.py

      - name: Validate Standard public JSON schemas
        run: python -B validate_schemas.py

      - name: Run clean-checkout code and committed-baseline tests
        run: python -B -m pytest

      - name: Write validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Pull request validation"
            echo
            echo "- Repository validation, rule validation, schema validation, and clean-checkout pytest were requested."
            echo "- Job result: ${{ job.status }}"
            echo "- Python: 3.12"
            echo "- This workflow does not fetch tournament data or publish repository changes."
          } >> "$GITHUB_STEP_SUMMARY"
